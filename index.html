<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Index</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --line: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      color: var(--text);
      background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        var(--bg);
      background-size: 24px 24px, 24px 24px, auto;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      background: rgba(22, 27, 34, 0.92);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    .label {
      display: inline-block;
      margin-bottom: 14px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.1;
      color: #f0f6fc;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .terminal {
      margin: 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0b0f14;
      overflow-x: auto;
      color: var(--text);
      font-size: 13px;
      line-height: 1.7;
    }

    .prompt { color: var(--accent); }

    .footer {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="label">Developer Preview</div>
    <h1>NAKOSUKI.COM</h1>
    <p>公開テスト</p>

    <pre class="terminal"><span class="prompt">$</span> ls
index.html

<span class="prompt">$</span> echo "nako suki!"
nako suki!</pre>

    <div class="footer">Static / Minimal / Single File</div>
  </main>
</body>
</html>
